<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ecosystem Live</title>

<style>

body{
    margin:0;
    background:#050510;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

canvas{
    display:block;
    margin:auto;
    background:#0f1a2e;
}

/* 🔥 PANEL CORRIGÉ */
.panel{
    position:fixed;
    right:15px;
    top:15px;
    background:#111;
    padding:15px;
    border-radius:10px;
    width:230px;
    text-align:left;
    font-size:14px;
    z-index:9999; /* reste au-dessus du monde */
}

.panel label{
    display:block;
    margin-top:8px;
}

.panel input{
    width:100%;
}

</style>

</head>
<body>

<h2>Ecosystème Evolutif</h2>

<canvas id="world"></canvas>

<div class="panel">

<label>Simulation Speed</label>
<input type="range" id="speed" min="50" max="800" value="400">

<label>Predator Speed</label>
<input type="range" id="predSpeed" min="0.05" max="1" step="0.05" value="0.2">

<label>Predators</label>
<input type="range" id="predCount" min="0" max="20" value="3">

<label>Creatures</label>
<input type="range" id="creatureCount" min="1" max="100" value="15">

<label>Food Spawn</label>
<input type="range" id="foodSpawn" min="1" max="50" value="15">

<label>Friction</label>
<input type="range" id="friction" min="0.70" max="0.99" step="0.01" value="0.92">

</div>

<script src="brain.js"></script>
<script src="sim.js"></script>

</body>
</html>
