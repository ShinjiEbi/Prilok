<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Evolution World</title>

<style>
body{
margin:0;
background:black;
}
canvas{
display:block;
}
button{
position:fixed;
top:20px;
left:20px;
z-index:999;
padding:15px;
font-size:18px;
}
</style>

</head>
<body>

<button id="startAudio">Activer le son</button>
<canvas id="world"></canvas>

<script src="Brain.js"></script>
<script src="SoundSystem.js"></script>

<script>

/* ================= AUDIO ================= */

document.getElementById("startAudio").onclick=async()=>{

await new Promise(r=>{
let ctx=new (window.AudioContext||window.webkitAudioContext)()
ctx.resume().then(r)
})

audioUnlocked=true
document.getElementById("startAudio").style.display="none"
}

/* ================= CONFIG ================= */

const size=50
const cell=12
const MAX_CREATURES=400

const canvas=document.getElementById("world")
const ctx=canvas.getContext("2d")

canvas.width=size*cell
canvas.height=size*cell

let creatures=[]
let food=[]
let predators=[]

/* ================= UTILS ================= */

function clamp(v){
return Math.max(0,Math.min(size-1,v))
}

function distance(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

/* ================= FOOD ================= */

function spawnFood(){
if(Math.random()<0.3){
food.push({
x:Math.random()*size|0,
y:Math.random()*size|0
})
}
}

function eatFood(creature){

food=food.filter(f=>{

if(Math.floor(f.x)==Math.floor(creature.x) &&
Math.floor(f.y)==Math.floor(creature.y)){

creature.energy+=50
creature.sound?.emit("food",1)
return false
}

return true
})
}

/* ================= CREATURE ================= */

class Creature{

constructor(){

this.x=Math.random()*size
this.y=Math.random()*size

this.vx=0
this.vy=0

this.energy=120

this.brain=new Brain()
this.sound=new SoundSystem()
}

update(){

let nearestFood=null
let min=9999

food.forEach(f=>{
let d=distance(this,f)
if(d<min){
min=d
nearestFood=f
}
})

let inputs=[
(nearestFood?.x-this.x||0)/size,
(nearestFood?.y-this.y||0)/size,
this.energy/150,
food.length/100,
predators.length/10,
this.x/size,
this.y/size,
min/10,
Math.random()
]

let output=this.brain.think(inputs)

/* ===== WALL FORCE ===== */

let wallX=0
let wallY=0
let margin=5

if(this.x<margin) wallX=0.6
if(this.x>size-margin) wallX=-0.6
if(this.y<margin) wallY=0.6
if(this.y>size-margin) wallY=-0.6

/* ===== MOVE ===== */

this.vx+=output[0]*0.2 + wallX
this.vy+=output[1]*0.2 + wallY

this.vx*=0.9
this.vy*=0.9

this.x+=this.vx
this.y+=this.vy

this.x=clamp(this.x)
this.y=clamp(this.y)

this.energy-=0.2

if(this.energy<20){
this.vx*=0.5
this.vy*=0.5
}

eatFood(this)

/* ===== REPRODUCTION ===== */

if(this.energy>180 && creatures.length<MAX_CREATURES){

let child=new Creature()
child.brain=this.brain.clone()
child.brain.mutate(0.1)

creatures.push(child)

this.energy-=70
}

/* ===== ENTRAIDE ===== */

creatures.forEach(other=>{

if(other!==this){

let d=distance(this,other)

if(d<6 && this.energy<80 && other.energy>100){

let transfer=0.5

this.energy+=transfer
other.energy-=transfer

this.sound.emit("help",0.5)
}

}
})

}

/* DRAW */

draw(){

ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(this.x*cell,this.y*cell,cell/3,0,Math.PI*2)
ctx.fill()
}

}

/* ================= PREDATOR ================= */

class Predator{

constructor(){

this.x=Math.random()*size
this.y=Math.random()*size

this.vx=0
this.vy=0

this.energy=150
}

update(){

let target=creatures.sort((a,b)=>
distance(this,a)-distance(this,b)
)[0]

if(target){

let dx=target.x-this.x
let dy=target.y-this.y

this.vx+=Math.sign(dx)*0.08
this.vy+=Math.sign(dy)*0.08
}

this.vx*=0.92
this.vy*=0.92

this.x+=this.vx
this.y+=this.vy

this.x=clamp(this.x)
this.y=clamp(this.y)

this.energy-=0.3

creatures=creatures.filter(c=>{

if(distance(c,this)<0.8){

this.energy+=80
return false
}

return true
})

if(this.energy<=0){
this.dead=true
}

}

draw(){

ctx.fillStyle="red"
ctx.beginPath()
ctx.arc(this.x*cell,this.y*cell,cell/2,0,Math.PI*2)
ctx.fill()
}

}

/* ================= INIT ================= */

creatures=Array.from({length:20},()=>new Creature())
predators=Array.from({length:1},()=>new Predator())

/* ================= LOOP ================= */

function loop(){

ctx.fillStyle="#0b1425"
ctx.fillRect(0,0,canvas.width,canvas.height)

spawnFood()

food.forEach(f=>{
ctx.fillStyle="lime"
ctx.fillRect(f.x*cell,f.y*cell,cell,cell)
})

creatures.forEach(c=>{
c.update()
c.draw()
})

predators=predators.filter(p=>!p.dead)

predators.forEach(p=>{
p.update()
p.draw()
})

creatures=creatures.filter(c=>c.energy>0)

requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
