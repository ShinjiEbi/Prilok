<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Evolution Language</title>

<style>
body{
margin:0;
background:black;
}
canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="world"></canvas>

<script src="Brain.js"></script>
<script src="SoundSystem.js"></script>

<script>

const size = 50
const cell = 12
const canvas = document.getElementById("world")
const ctx = canvas.getContext("2d")

canvas.width = size * cell
canvas.height = size * cell

let creatures=[]
let food=[]
let predators=[]

function clamp(v){
return Math.max(0,Math.min(size-1,v))
}

function distance(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

/* ================= CREATURE ================= */

class Creature {

constructor(){

this.x=Math.random()*size
this.y=Math.random()*size

this.vx=0
this.vy=0

this.energy=100
this.brain=new Brain()
this.soundSystem=new SoundSystem()
this.emittedSound=null
this.soundMemory={}
}

update(){

// nourriture simple
let nearest=null
let min=9999

food.forEach(f=>{
let d=distance(this,f)
if(d<min){
min=d
nearest=f
}
})

let inputs=[
(nearest?.x-this.x||0)/size,
(nearest?.y-this.y||0)/size,
this.energy/100,
predators.length/10
]

let output=this.brain.think(inputs)

// mouvement
this.vx+=output[0]*0.2
this.vy+=output[1]*0.2

this.vx*=0.9
this.vy*=0.9

this.x+=this.vx
this.y+=this.vy

this.x=clamp(this.x)
this.y=clamp(this.y)

this.energy-=0.2

// ===== EMISSION SONORE =====

if(Math.random()<0.03){

let brainOutput=this.brain.think([
this.energy/100,
Math.random(),
Math.random()
])

let sound=this.soundSystem.emit({
freq:brainOutput[0],
duration:brainOutput[1],
volume:brainOutput[2]
})

this.emittedSound=sound
}

// ===== ECOUTE =====

creatures.forEach(other=>{

if(other!==this && other.emittedSound){

let d=distance(this,other)

if(d<8){

let influence=1-(d/8)

if(this.energy<80){
this.energy+=influence*0.5

this.soundMemory[other.emittedSound.freq]=
(this.soundMemory[other.emittedSound.freq]||0)+0.1
}
}
}
})

}

draw(){

ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(this.x*cell,this.y*cell,cell/3,0,Math.PI*2)
ctx.fill()
}

}

/* ================= INIT ================= */

creatures=Array.from({length:15},()=>new Creature())

/* ================= LOOP ================= */

function loop(){

ctx.fillStyle="#0b1425"
ctx.fillRect(0,0,canvas.width,canvas.height)

creatures.forEach(c=>{
c.update()
c.draw()
})

creatures=creatures.filter(c=>c.energy>0)

requestAnimationFrame(loop)
}

loop()

</script>
</body>
</html>
