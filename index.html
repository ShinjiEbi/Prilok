<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ecosystem Control</title>

<style>
body{
    margin:0;
    background:#050510;
    color:white;
    font-family:sans-serif;
    text-align:center;
}

canvas{
    display:block;
    margin:auto;
    background:#0f1a2e;
}

.panel{
    position:fixed;
    right:10px;
    top:10px;
    background:#111;
    padding:15px;
    border-radius:10px;
    width:220px;
    text-align:left;
    font-size:14px;
}

input{
    width:100%;
}
</style>

</head>
<body>

<h2>Ecosystème — Paramètres Live</h2>

<canvas id="world"></canvas>

<div class="panel">

<label>Simulation Speed</label>
<input type="range" id="speed" min="50" max="800" value="400">

<label>Predator Speed</label>
<input type="range" id="predSpeed" min="0.05" max="1" step="0.05" value="0.2">

<label>Predators</label>
<input type="range" id="predCount" min="0" max="20" value="3">

<label>Creatures</label>
<input type="range" id="creatureCount" min="1" max="100" value="15">

<label>Food Spawn</label>
<input type="range" id="foodSpawn" min="1" max="50" value="15">

<label>Friction</label>
<input type="range" id="friction" min="0.7" max="0.99" step="0.01" value="0.92">

</div>

<script src="brain.js"></script>
<script src="sim.js"></script>

</body>
</html>
