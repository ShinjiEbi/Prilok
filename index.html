<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Evolution Survival</title>

<style>
body{
margin:0;
background:black;
}
canvas{
display:block;
}
</style>

</head>
<body>

<canvas id="world"></canvas>

<script src="Brain.js"></script>

<script>

/* ================= CONFIG ================= */

const size = 50
const cell = 12
const MAX_CREATURES = 60

const canvas = document.getElementById("world")
const ctx = canvas.getContext("2d")

canvas.width = size * cell
canvas.height = size * cell

let creatures = []
let food = []

/* ================= UTILS ================= */

function clamp(v){
return Math.max(0,Math.min(size-1,v))
}

function distance(a,b){
return Math.hypot(a.x-b.x,a.y-b.y)
}

/* ================= FOOD ================= */

function spawnFood(){
if(Math.random()<0.3){
food.push({
x:Math.random()*size|0,
y:Math.random()*size|0
})
}
}

function eatFood(creature){

food = food.filter(f=>{

if(Math.floor(f.x)==Math.floor(creature.x) &&
Math.floor(f.y)==Math.floor(creature.y)){

creature.energy += 50
return false
}

return true
})
}

/* ================= CREATURE ================= */

class Creature{

constructor(){

this.x=Math.random()*size
this.y=Math.random()*size

this.vx=0
this.vy=0

this.energy=120

this.brain=new Brain()
}

update(){

let nearestFood=null
let min=9999

food.forEach(f=>{
let d=distance(this,f)
if(d<min){
min=d
nearestFood=f
}
})

/* ================= INPUTS ================= */

let inputs=[
(nearestFood?.x-this.x||0)/size,
(nearestFood?.y-this.y||0)/size,
this.energy/150,
food.length/100,
Math.min(min/10,1),
this.x/size,
this.y/size
]

let output=this.brain.think(inputs)

/* ================= WALL FORCE ================= */

let wallForceX=0
let wallForceY=0
let margin=5

if(this.x<margin) wallForceX=0.6
if(this.x>size-margin) wallForceX=-0.6
if(this.y<margin) wallForceY=0.6
if(this.y>size-margin) wallForceY=-0.6

/* ================= MOVE ================= */

this.vx += output[0]*0.2 + wallForceX
this.vy += output[1]*0.2 + wallForceY

this.vx*=0.9
this.vy*=0.9

this.x+=this.vx
this.y+=this.vy

this.x=clamp(this.x)
this.y=clamp(this.y)

this.energy-=0.2

if(this.energy<20){
this.vx*=0.5
this.vy*=0.5
}

eatFood(this)

/* ================= REPRODUCTION ================= */

if(this.energy>180 && creatures.length<MAX_CREATURES){

let child=new Creature()
child.brain=this.brain.clone()
child.brain.mutate(0.1)

creatures.push(child)

this.energy-=70
}

}

/* ================= DRAW ================= */

draw(){

ctx.fillStyle="cyan"
ctx.beginPath()
ctx.arc(this.x*cell,this.y*cell,cell/3,0,Math.PI*2)
ctx.fill()
}

}

/* ================= INIT ================= */

creatures=Array.from({length:20},()=>new Creature())

/* ================= LOOP ================= */

function loop(){

ctx.fillStyle="#0b1425"
ctx.fillRect(0,0,canvas.width,canvas.height)

spawnFood()

food.forEach(f=>{
ctx.fillStyle="lime"
ctx.fillRect(f.x*cell,f.y*cell,cell,cell)
})

creatures.forEach(c=>{
c.update()
c.draw()
})

creatures=creatures.filter(c=>c.energy>0)

requestAnimationFrame(loop)
}

loop()

</script>

</body>
</html>
